name: Release

# Triggered by pushing a version tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

jobs:
  pack:
    name: Build, Test & Pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # Verify the pushed tag matches VersionPrefix in Directory.Build.props.
      # With Option A versioning these are kept in sync by hand, so this guard
      # catches the mistake of tagging v0.2.0 while the file still says 0.1.0.
      - name: Verify tag matches VersionPrefix
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          echo "Git tag (stripped): $TAG"
          echo "VersionPrefix:      $PREFIX"
          if [ "$TAG" != "$PREFIX" ]; then
            echo "::error::Tag '$TAG' does not match VersionPrefix '$PREFIX' in Directory.Build.props."
            exit 1
          fi
          echo "Tag and VersionPrefix match."

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./artifacts

      - name: Upload packages as build artifact
        uses: actions/upload-artifact@v5
        with:
          name: nuget-packages
          path: ./artifacts/*

  publish:
    name: Publish to NuGet.org
    needs: pack
    runs-on: ubuntu-latest
    # The 'nuget-publish' environment gates the publish behind manual
    # approval. Create it in repo Settings > Environments and add yourself
    # as a required reviewer. To publish automatically with no approval
    # gate, remove the 'environment:' line below.
    environment: nuget-publish
    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Push packages to NuGet.org
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        # --skip-duplicate: if a version is already published, skip it
        # rather than failing the whole run.
